<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Round_One — 복싱 훈련 트래커</title>
<meta name="description" content="맞춤 복싱 루틴 추천 & 훈련 기록 앱" />
<meta name="theme-color" content="#0e0e0e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Round_One" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-name">Round_One</div>
      <div class="brand-rank" id="sidebarRank">RANK · ROOKIE</div>
    </div>
    <nav class="nav" id="nav">
      <a data-route="dashboard" class="active"><span class="icon">▣</span> 메인 화면</a>
      <a data-route="today"><span class="icon">⚡</span> 오늘의 목표</a>
      <a data-route="logs"><span class="icon">◉</span> 훈련 기록</a>
      <a data-route="guide"><span class="icon">📖</span> 이용가이드</a>
      <a data-route="settings"><span class="icon">⚙</span> 설정</a>
    </nav>
    <div class="sidebar-cta">
      <button class="btn btn-primary" id="sideStartBtn">START MISSION</button>
    </div>
  </aside>

  <main class="main" id="view"></main>
</div>

<!-- 모바일 하단 네비게이션 -->
<nav class="mobile-nav" id="mobileNav">
  <a data-route="dashboard"><span class="icon">▣</span>메인 화면</a>
  <a data-route="today"><span class="icon">⚡</span>루틴</a>
  <a data-route="logs"><span class="icon">◉</span>기록</a>
  <a data-route="guide"><span class="icon">📖</span>가이드</a>
  <a data-route="settings"><span class="icon">⚙</span>설정</a>
</nav>

<!-- 프로필 입력 모달 -->
<div class="modal-backdrop" id="profileModal">
  <div class="modal">
    <h2 class="font-display display-md mb-24">오늘의 <span class="accent">미션</span> 설정</h2>

    <div class="form-group">
      <label class="form-label">난이도</label>
      <div class="pill-group" data-group="difficulty">
        <div class="pill" data-value="easy">LOW</div>
        <div class="pill active" data-value="normal">MIDDLE</div>
        <div class="pill" data-value="hard">HIGH</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">훈련 장소</label>
      <div class="pill-group" data-group="venue">
        <div class="pill active" data-value="gym">GYM</div>
        <div class="pill" data-value="home">HOME</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">목표</label>
      <div class="pill-group" data-group="goal">
        <div class="pill active" data-value="technique">TECHNIQUE</div>
        <div class="pill" data-value="cardio">HEALTH</div>
        <div class="pill" data-value="weightloss">DIET</div>
      </div>
    </div>

    <div class="flex gap-16 mt-32" style="align-items:stretch;">
      <button class="btn btn-ghost" id="cancelProfile" style="min-width:80px;white-space:nowrap;">취소</button>
      <button class="btn btn-primary" id="generateBtn" style="flex:1;">미션 생성</button>
    </div>
  </div>
</div>

<!-- 운동 상세 모달 -->
<div class="modal-backdrop" id="exerciseModal">
  <div class="modal modal-lg" id="exerciseModalContent"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyB1cHj-fnUcMEOf017fxo8ppGQhSoVElXk",
  authDomain: "boxing-training-app-9da0f.firebaseapp.com",
  projectId: "boxing-training-app-9da0f",
  storageBucket: "boxing-training-app-9da0f.firebasestorage.app",
  messagingSenderId: "599801311892"
});
</script>
<script src="js/exercises.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/recommender.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
